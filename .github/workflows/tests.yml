name: Testing

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  pytest:
    name: Run Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --prerelease=allow

      - name: Run tests
        run: uv run pytest
